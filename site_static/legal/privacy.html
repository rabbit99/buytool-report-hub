    <h1>隱私與資料說明</h1>
    <p>本站使用的資料來自玩家在公開社群中自發的討論內容，並透過自動化工具進行彙整與分類。原始訊息均不公開，僅展示 AI 分析摘要。</p>
    <ul>
      <li>本站不提供個人帳號登入，也不主動萃集訪客個人資料。</li>
      <li>報告內容已經去識別化處理，不包含原始權定、LINE ID 或其他可識別个人資訊。</li>
      <li>資料來源為玩家在公開社群自發的公開發言，不代表對發言者之特定丫絕。</li>
      <li>若報告中含可識別個人的資訊，請聽説令站方處理去識別或下架。</li>
      <li>你應確認所在地區法律與平台規範是否允許使用與轉載這些資訊。</li>
    </ul>
    <p>如有隱私疑慮，請立即通知管理者處理。</p>
    <p><a href="../index.html">回首頁</a></p>
  </main>
